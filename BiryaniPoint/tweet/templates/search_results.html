{% extends "layout.html" %}

{% block title %}Explore / Twitter Clone{% endblock %}

{% block content %}
<div class="feed-header" style="padding: 16px; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); z-index: 10;">
    <div style="display: flex; gap: 24px; align-items: center;">
        <a href="{% url 'tweet_list' %}" class="btn-icon">
            <i data-lucide="arrow-left"></i>
        </a>
        <h2 style="font-size: 20px; font-weight: 700;">Search Results for "{{ query }}"</h2>
    </div>
</div>

<div class="feed-list" style="padding-top: 8px;">
    {% for tweet in results %}
        {% include "components/tweet_card.html" %}
    {% empty %}
        <div style="padding: 32px; text-align: center; color: var(--text-secondary);">
            <p>No results found for "{{ query }}".</p>
        </div>
    {% endfor %}
</div>
{% endblock %}

{% extends "layout.html" %}

{% block title %}
Biryani aur Django - Home
{% endblock %}

{% block content %}
<h1 class=" text-center mt-5">
Welcome to Biryani aur Django!
</h1>
<h2> 
    {% if form.instance.pk %}
    Edit Tweet
    {% else %}
    Create Tweet
    {% endif %}
    <form method="post" enctype="multipart/form-data"class="form" >
        {{ form.as_p }}
        <button type="submit" class="btn btn-warning">Save Tweet</button>
        {% csrf_token %}
    </form>
    <a href="{% url 'tweet_list' %}">Back to Tweets</a>
 </h2>
{% endblock %}
